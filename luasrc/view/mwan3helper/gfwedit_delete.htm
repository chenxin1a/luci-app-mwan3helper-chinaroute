<div class="cbi-value">
    <label class="cbi-value-title"><%:删除域名%></label>
    <div class="cbi-value-field">
        <textarea id="delete_domains" rows="5" placeholder="一行一个，如&#10;example.com&#10;test.com" style="width: 300px;"></textarea>
        <br/>
        <input type="button" class="btn cbi-button cbi-button-remove" value="<%:删除%>" onclick="deleteDomains(); return false;" />
    </div>
</div>
<div class="cbi-value" id="delete_msg">
    <div class="cbi-value-field">
        <span id="delete_msg_text"></span>
    </div>
</div>

<script type="text/javascript">
//<![CDATA[
function deleteDomains() {
    var domains = document.getElementById('delete_domains').value.trim();
    var msgText = document.getElementById('delete_msg_text');
    
    if (domains === '') {
        msgText.style.color = 'red';
        msgText.textContent = '<%:请输入要删除的域名%>';
        return false;
    }

    var lines = domains.split('\n').filter(function(l) { return l.trim() !== ''; });
    if (lines.length === 0) {
        msgText.style.color = 'red';
        msgText.textContent = '<%:请输入有效的域名%>';
        return false;
    }

    var btn = document.querySelector('input[onclick="deleteDomains(); return false;"]');
    if (btn) {
        btn.disabled = true;
        btn.value = '<%:处理中...%>';
    }

    XHR.post('<%=luci.dispatcher.build_url("admin/services/mwan3helper/delete_domain")%>', 
        {domains: domains},
        function(x, json)
        {
            if (btn) {
                btn.disabled = false;
                btn.value = '<%:删除%>';
            }
            
            if (json) {
                if (json.status === 'ok') {
                    msgText.style.color = 'green';
                    msgText.textContent = '<%:已删除%> ' + json.deleted + ' <%:条记录，请重启服务使更改生效%>';
                    document.getElementById('delete_domains').value = '';
                    setTimeout(function() { location.reload(); }, 3000);
                } else {
                    msgText.style.color = 'red';
                    msgText.textContent = json.msg || '<%:操作失败%>';
                }
            } else {
                msgText.style.color = 'red';
                msgText.textContent = '<%:请求失败%>';
            }
        }
    );
    return false;
}
//]]>
</script>
